<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect8 Admin - Logga in</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 12px; padding: 40px; width: 100%; max-width: 380px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 1.8rem; color: #e94560; }
        .logo p { color: #999; font-size: 0.9rem; margin-top: 4px; }
        label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 4px; font-weight: 500; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #e94560; }
        button { width: 100%; padding: 12px; background: #e94560; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: 600; }
        button:hover { background: #c73652; }
        .error { background: #fdecea; color: #c62828; padding: 10px 12px; border-radius: 6px; margin-bottom: 16px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>Perfect8</h1>
            <p>Admin Portal</p>
        </div>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autofocus>
            <label for="password">Lösenord</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Logga in</button>
        </form>
    </div>
</body>
</html>
